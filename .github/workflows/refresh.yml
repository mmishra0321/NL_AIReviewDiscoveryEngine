name: Weekly Review Refresh

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      seed_only:
        description: "Use only curated seed reviews (skip scrape)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [[ "${{ github.event.inputs.seed_only }}" == "true" ]]; then
            python -m src.pipeline.refresh --seed-only
          else
            python -m src.pipeline.refresh
          fi

      - name: Show metadata
        run: cat data/metadata.json || true

      - name: Commit refreshed data
        run: |
          git config user.name "spotify-review-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(refresh): weekly review data update $(date -u +%Y-%m-%d)"
            git push
          fi
